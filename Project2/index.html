<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECE Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #bb0000;
            text-align: center;
            font-size: 24px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #666666;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        input[type="number"] {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 16px;
    }
    label {
        font-weight: bold;
        color: #333;
        font-size: 14px;
    }
    </style>
</head>
<body>
    <h1>Ohm's Law Calculator</h1>
    <label for="voltage">Voltage (V):</label>
    <input type="number" id="voltage" placeholder="e.g., 12">
    <br><br>

    <label for="resistance">Resistance (Ω):</label>
    <input type="number" id="resistance" placeholder="e.g., 220">
    <br><br>

    <button id="button">Calculate Current</button>
    <h3 id="result">Current (I): -- A</h3>
    <script>
        const voltageInput = document.getElementById('voltage');
        const resistanceInput = document.getElementById('resistance');
        const resultDisplay = document.getElementById('result');
        const calculateButton = document.getElementById('button');

        calculateButton.addEventListener('click', function() {
            const V = Number(voltageInput.value);
            const R = Number(resistanceInput.value);

            if (voltageInput.value === "" || resistanceInput.value === "") {
                resultDisplay.textContent = "Error: Please enter both values.";
                resultDisplay.style.color = "red";
            }

            else if (R === 0) {
                resultDisplay.textContent = "Error: Resistance cannot be zero.";
                resultDisplay.style.color = "red";
            }

            else {
                const I = V / R;
                resultDisplay.textContent = "Current (I): " + I.toFixed(3) + " A";
                resultDisplay.style.color = "#333";
            }

            const I = V / R;
            resultDisplay.textContent = "Current (I): " + I + " A";
        })
        console.log("Fireware initialized successfully!"); 
    </script>
</body>
</html>
